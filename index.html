<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Srini's Research</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      font-family: 'Anton', sans-serif;
      color: white;
      overflow: hidden;
    }

    .center-screen {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    #logo {
      width: 150px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 4px;
      margin-bottom: 10px;
      color: #e23636;
      text-shadow: 2px 2px 15px #000000;
    }

    .enter-btn {
      padding: 12px 30px;
      font-size: 20px;
      background: #e23636;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      font-family: 'Montserrat', sans-serif;
      transition: 0.3s;
    }

    .enter-btn:hover {
      background: #f5c518;
      color: black;
    }

    .portal {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1152px;
      height: 648px;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 100;
    }

    .fade-out {
      animation: fadeOut 1s ease-in-out forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }
  </style>
</head>
<body>
  <div class="portal" id="portal">
    <img src="/images/portal.gif" alt="Portal Animation" style="width: 100%; height: 100%;">
  </div>

  <div class="center-screen" id="mainContent">
    <h1>Srini's Nanoverse</h1>
    <button class="enter-btn" onclick="openPortal()">Open Portal</button>
  </div>

  <script>
    function openPortal() {
      document.getElementById("portal").style.display = "block";
      document.getElementById("mainContent").classList.add("fade-out");

      setTimeout(function() {
        window.location.href = "/home/";
      }, 2500); // Delay 4 seconds
    }
  </script>
</body>
</html>
