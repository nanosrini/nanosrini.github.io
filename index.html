<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nanosrini </title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Marvel Font & Basic Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: url('/images/avengers_bg.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Bebas Neue', sans-serif;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    h1 {
      font-size: 60px;
      letter-spacing: 4px;
      margin-bottom: 10px;
      color: #e23636;
      text-shadow: 2px 2px 5px black;
    }
    #logo {
      width: 150px;
      margin-bottom: 30px;
    }
    .enter-btn {
      padding: 12px 30px;
      font-size: 20px;
      background: #e23636;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      font-family: 'Montserrat', sans-serif;
      transition: 0.3s;
    }
    .enter-btn:hover {
      background: #f5c518;
      color: black;
    }
  </style>
</head>
<body>
  <img id="logo" src="/images/marvel_logo.png" alt="Logo">
  <h1>Srinivasa Sundara Rajan R</h1>
  <button class="enter-btn" onclick="window.location.href='/home/'">Enter</button>
</body>
</html>
